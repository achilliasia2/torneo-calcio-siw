<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classifica React</title>
<style>
    :root {
        --primary: #1d4ed8;
        --primary-hover: #1e40af;
        --accent: #16a34a;
        --border: #bfdbfe;
        --text-main: #1f2937;
        --text-muted: #64748b;
    }
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
        background:
            radial-gradient(circle at top left, rgba(22, 163, 74, 0.12), transparent 320px),
            linear-gradient(180deg, #edf7f1 0, #f7f9fb 340px);
        color: var(--text-main);
        line-height: 1.5;
        min-height: 100vh;
    }
    .nav {
        align-items: center;
        background: linear-gradient(135deg, #1d4ed8 0%, #15803d 100%);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
        display: flex;
        height: 60px;
        justify-content: space-between;
        padding: 0 28px;
        position: sticky;
        top: 0;
        z-index: 1000;
    }
    .nav-brand,
    .nav-link {
        color: white;
        text-decoration: none;
    }
    .nav-brand {
        font-size: 18px;
        font-weight: 700;
    }
    .nav-links {
        display: flex;
        gap: 4px;
    }
    .nav-link {
        border-radius: 6px;
        color: rgba(255,255,255,0.86);
        font-size: 14px;
        padding: 7px 12px;
    }
    .nav-link:hover {
        background: rgba(255,255,255,0.14);
        color: white;
    }
    .content {
        margin: 0 auto;
        max-width: 1100px;
        padding: 32px 24px;
    }
    .page-hero {
        background:
            linear-gradient(135deg, rgba(29,78,216,0.94), rgba(22,163,74,0.88)),
            radial-gradient(circle at top right, rgba(250,204,21,0.36), transparent 220px);
        border-radius: 18px;
        box-shadow: 0 18px 42px rgba(15,23,42,0.18);
        color: white;
        margin-bottom: 24px;
        overflow: hidden;
        padding: 30px;
        position: relative;
    }
    .page-hero h1 {
        font-size: 34px;
        line-height: 1.1;
        margin-bottom: 10px;
    }
    .page-hero p {
        color: rgba(255,255,255,0.84);
        font-size: 15px;
        line-height: 1.7;
        max-width: 660px;
    }
    .react-badge {
        background: rgba(255,255,255,0.95);
        border-radius: 12px;
        color: #1e40af;
        font-size: 14px;
        font-weight: 850;
        padding: 10px 14px;
        position: absolute;
        right: 24px;
        top: 24px;
    }
    .summary-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-bottom: 24px;
    }
    .summary-card {
        background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 14px 34px rgba(15,23,42,0.08);
        padding: 20px;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .summary-card:hover {
        border-color: #60a5fa;
        box-shadow: 0 22px 44px rgba(15,23,42,0.14);
        transform: translateY(-3px);
    }
    .summary-label {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
    }
    .summary-value {
        color: #1e3a8a;
        display: block;
        font-size: 26px;
        font-weight: 900;
        margin-top: 6px;
    }
    .table-card {
        background: white;
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 14px 34px rgba(15,23,42,0.08);
        overflow-x: auto;
    }
    table {
        border-collapse: collapse;
        min-width: 760px;
        width: 100%;
    }
    thead tr {
        background: linear-gradient(135deg, #eff6ff 0%, #ecfdf5 100%);
        border-bottom: 1px solid var(--border);
    }
    th {
        color: #1e3a8a;
        font-size: 12px;
        padding: 14px 16px;
        text-align: left;
        text-transform: uppercase;
    }
    td {
        border-bottom: 1px solid #edf2f7;
        padding: 14px 16px;
    }
    tbody tr:hover {
        background: #f8fafc;
    }
    .position {
        color: var(--text-muted);
        font-weight: 800;
    }
    .points {
        color: #1d4ed8;
        font-weight: 900;
    }
    .positive {
        color: #16a34a;
        font-weight: 800;
    }
    .negative {
        color: #dc2626;
        font-weight: 800;
    }
    .neutral {
        color: #94a3b8;
        font-weight: 800;
    }
    .empty-state,
    .error-state,
    .loading-state {
        background: rgba(255,255,255,0.72);
        border: 1px dashed #93c5fd;
        border-radius: 14px;
        color: var(--text-muted);
        padding: 34px;
        text-align: center;
    }
    .error-state {
        border-color: #fecaca;
        color: #991b1b;
    }
    .spinner {
        animation: spin 0.8s linear infinite;
        border: 4px solid #dbeafe;
        border-top-color: #1d4ed8;
        border-radius: 50%;
        height: 34px;
        margin: 0 auto 12px;
        width: 34px;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .actions {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 22px;
        flex-wrap: wrap;
    }
    .btn-action,
    .muted-action {
        border-radius: 6px;
        display: inline-block;
        font-weight: 700;
        padding: 10px 18px;
        text-decoration: none;
    }
    .btn-action {
        background: var(--primary);
        color: white;
    }
    .btn-action:hover {
        background: var(--primary-hover);
    }
    .muted-action {
        background: white;
        border: 1px solid var(--border);
        color: #1e40af;
    }
    @media (max-width: 760px) {
        .nav {
            align-items: flex-start;
            flex-direction: column;
            gap: 12px;
            height: auto;
            padding: 14px 18px;
        }
        .nav-links {
            flex-wrap: wrap;
        }
        .content {
            padding: 24px 16px;
        }
        .page-hero {
            padding: 24px;
        }
        .page-hero h1 {
            font-size: 28px;
        }
        .react-badge {
            display: inline-block;
            margin-top: 18px;
            position: static;
        }
        .summary-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>
<div class="nav">
    <a class="nav-brand" href="/">Tornei Calcio</a>
    <div class="nav-links">
        <a class="nav-link" href="/tornei">Tornei</a>
        <a class="nav-link" href="/squadre">Squadre</a>
    </div>
</div>

<main class="content">
    <div id="root"></div>
</main>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function RigaClassifica({ riga, posizione }) {
    const differenzaReti = riga.gf - riga.gs;
    const diffClass = differenzaReti > 0 ? 'positive' : differenzaReti < 0 ? 'negative' : 'neutral';

    return (
        <tr>
            <td className="position">{posizione}</td>
            <td><strong>{riga.squadra}</strong></td>
            <td className="points">{riga.punti}</td>
            <td>{riga.vittorie}</td>
            <td>{riga.pareggi}</td>
            <td>{riga.sconfitte}</td>
            <td>{riga.gf}</td>
            <td>{riga.gs}</td>
            <td className={diffClass}>
                {differenzaReti > 0 ? '+' : ''}{differenzaReti}
            </td>
        </tr>
    );
}

function Classifica() {
    const [classifica, setClassifica] = useState([]);
    const [torneo, setTorneo] = useState(null);
    const [loading, setLoading] = useState(true);
    const [errore, setErrore] = useState(null);

    const torneoId = new URLSearchParams(window.location.search).get('torneoId');
    const prima = classifica[0];
    const partiteGiocate = classifica.reduce((totale, riga) => totale + riga.vittorie + riga.pareggi + riga.sconfitte, 0) / 2;

    useEffect(() => {
        if (!torneoId) {
            setErrore("ID torneo non specificato");
            setLoading(false);
            return;
        }

        fetch(`/api/tornei/${torneoId}/classifica`)
            .then(res => {
                if (!res.ok) throw new Error("Errore nel caricamento");
                return res.json();
            })
            .then(data => {
                setClassifica(data.classifica);
                setTorneo(data.torneo);
                setLoading(false);
            })
            .catch(err => {
                setErrore(err.message);
                setLoading(false);
            });
    }, [torneoId]);

    if (loading) {
        return (
            <div className="loading-state">
                <div className="spinner"></div>
                <p>Caricamento classifica...</p>
            </div>
        );
    }

    if (errore) {
        return <div className="error-state">{errore}</div>;
    }

    return (
        <div>
            <section className="page-hero">
                <span className="react-badge">React + API REST</span>
                <h1>Classifica live</h1>
                <p>Torneo: <strong>{torneo}</strong>. Dati caricati dinamicamente tramite endpoint REST.</p>
            </section>

            <div className="summary-grid">
                <div className="summary-card">
                    <span className="summary-label">Squadre in classifica</span>
                    <span className="summary-value">{classifica.length}</span>
                </div>
                <div className="summary-card">
                    <span className="summary-label">Partite giocate</span>
                    <span className="summary-value">{partiteGiocate}</span>
                </div>
                <div className="summary-card">
                    <span className="summary-label">Prima posizione</span>
                    <span className="summary-value">{prima ? prima.squadra : '-'}</span>
                </div>
            </div>

            {classifica.length === 0 ? (
                <div className="empty-state">Nessuna partita giocata ancora.</div>
            ) : (
                <div className="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Squadra</th>
                                <th>Punti</th>
                                <th>V</th>
                                <th>P</th>
                                <th>S</th>
                                <th>GF</th>
                                <th>GS</th>
                                <th>DR</th>
                            </tr>
                        </thead>
                        <tbody>
                            {classifica.map((riga, index) => (
                                <RigaClassifica
                                    key={riga.squadra}
                                    riga={riga}
                                    posizione={index + 1}
                                />
                            ))}
                        </tbody>
                    </table>
                </div>
            )}

            <div className="actions">
                <a href={`/tornei/${torneoId}`} className="muted-action">Torna al torneo</a>
                <a href={`/tornei/${torneoId}/classifica`} className="btn-action">Classifica Thymeleaf</a>
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Classifica />);
</script>
</body>
</html>
