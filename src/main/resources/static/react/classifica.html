<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Classifica React</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    /* Stile per stondare la tabella e adattare i colori alla nuova grafica */
    .custom-table-container {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        background: white;
    }
    .custom-table thead {
        background-color: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
    }
    .custom-table th {
        color: #64748b !important;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 600;
        padding: 12px 16px !important;
    }
    .custom-table td {
        padding: 12px 16px !important;
        vertical-align: middle;
        border-bottom: 1px solid #f1f5f9;
    }
    /* Stondiamo il pulsante e usiamo il grigio del nuovo design */
    .btn-custom-back {
        background-color: #f1f5f9;
        color: #64748b;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: background 0.2s;
    }
    .btn-custom-back:hover {
        background-color: #e2e8f0;
        color: #334155;
    }
    /* Colore blu del brand per i punti */
    .punti-evidenziati {
        color: #2563eb;
        font-weight: 700;
    }
</style>
</head>
<body>
<div class="container mt-4">
<div id="root"></div>
</div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function RigaClassifica({ riga, posizione }) {
return (
<tr>
<td style={{ color: '#64748b', fontWeight: '500' }}>{posizione}°</td>
<td><strong>{riga.squadra}</strong></td>
<td class="punti-evidenziati">{riga.punti}</td>
<td>{riga.vittorie}</td>
<td>{riga.pareggi}</td>
<td>{riga.sconfitte}</td>
<td style={{ color: '#94a3b8' }}>{riga.gf}</td>
<td style={{ color: '#94a3b8' }}>{riga.gs}</td>
<td style={{ fontWeight: '600', color: riga.gf - riga.gs > 0 ? '#16a34a' : riga.gf - riga.gs < 0 ? '#dc2626' : '#94a3b8' }}>
    {riga.gf - riga.gs > 0 ? '+' : ''}{riga.gf - riga.gs}
</td>
</tr>
);
}

function Classifica() {
const [classifica, setClassifica] = useState([]);
const [torneo, setTorneo] = useState(null);
const [loading, setLoading] = useState(true);
const [errore, setErrore] = useState(null);

const torneoId = new URLSearchParams(window.location.search).get('torneoId');

useEffect(() => {
if (!torneoId) {
setErrore("ID torneo non specificato");
setLoading(false);
return;
}

fetch(`/api/tornei/${torneoId}/classifica`)
.then(res => {
if (!res.ok) throw new Error("Errore nel caricamento");
return res.json();
})
.then(data => {
setClassifica(data.classifica);
setTorneo(data.torneo);
setLoading(false);
})
.catch(err => {
setErrore(err.message);
setLoading(false);
});
}, [torneoId]);

if (loading) return <div className="text-center mt-5"><div className="spinner-border" style={{ color: '#2563eb' }}></div><p class="text-muted mt-2">Caricamento...</p></div>;
if (errore) return <div className="alert alert-danger" style={{ borderRadius: '10px' }}>{errore}</div>;

return (
<div>
<div class="mb-4">
    <h1 style={{ color: '#1e293b', fontSize: '28px', fontWeight: '600' }}>⚽ Classifica</h1>
    <p style={{ color: '#64748b', fontSize: '15px', margin: 0 }}>Torneo: {torneo}</p>
</div>

{classifica.length === 0 ? (
<div className="alert alert-info" style={{ borderRadius: '10px' }}>Nessuna partita giocata ancora.</div>
) : (
/* Il contenitore custom che applica gli angoli arrotondati (border-radius) */
<div className="custom-table-container shadow-sm mb-4">
<table className="table custom-table table-hover m-0">
<thead>
<tr>
<th>#</th>
<th>Squadra</th>
<th>Punti</th>
<th>V</th>
<th>P</th>
<th>S</th>
<th>GF</th>
<th>GS</th>
<th>DR</th>
</tr>
</thead>
<tbody>
{classifica.map((riga, index) => (
<RigaClassifica
key={riga.squadra}
riga={riga}
posizione={index + 1}
/>
))}
</tbody>
</table>
</div>
)}
<a href={`/tornei/${torneoId}`} className="btn-custom-back">← Torna al torneo</a>
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Classifica />);
</script>
</body>
</html>
