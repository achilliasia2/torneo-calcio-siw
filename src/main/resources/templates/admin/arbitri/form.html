<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1 th:text="${arbitro.id == null} ? 'Nuovo arbitro' : 'Modifica arbitro'">Form Arbitro</h1>
        <p>Registra i dati dell'arbitro e il suo codice arbitrale.</p>
    </div>

    <div class="form-panel">
        <form th:action="${arbitro.id == null} ? @{/admin/arbitri/nuovo} : @{/admin/arbitri/{id}/modifica(id=${arbitro.id})}"
              th:object="${arbitro}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Controlla i dati inseriti.
            </div>

            <div class="form-field">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" required>
            </div>
            <div class="form-field">
                <label>Cognome</label>
                <input type="text" th:field="*{cognome}" required>
            </div>
            <div class="form-field">
                <label>Codice arbitrale</label>
                <input type="text" th:field="*{codiceArbitrale}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-action" style="flex: 2;">Salva arbitro</button>
                <a th:href="@{/admin/arbitri}" class="muted-action" style="flex: 1; text-align: center;">Annulla</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
