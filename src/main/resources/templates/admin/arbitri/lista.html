<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <span class="page-hero-badge" th:text="${#lists.size(arbitri)}">0</span>
        <h1>Arbitri</h1>
        <p>Area amministratore per controllare e aggiornare gli arbitri disponibili.</p>
    </div>

    <div class="section-header">
        <span class="section-title">Gestione arbitri</span>
        <a th:href="@{/admin/arbitri/nuovo}" class="btn-action">Nuovo arbitro</a>
    </div>

    <div th:if="${erroreEliminazione}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;" th:text="${erroreEliminazione}">
        Errore eliminazione
    </div>

    <div class="sport-table-card" th:if="${!#lists.isEmpty(arbitri)}">
        <table class="sport-table">
            <thead>
                <tr>
                    <th>Nome / Cognome</th>
                    <th>Codice arbitrale</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="arbitro : ${arbitri}">
                    <td><strong th:text="${arbitro.cognome + ' ' + arbitro.nome}">Arbitro</strong></td>
                    <td><span class="card-badge badge-blue" th:text="${arbitro.codiceArbitrale}">REF123</span></td>
                    <td>
                        <div style="display: flex; gap: 6px; align-items: center;">
                            <a th:href="@{/admin/arbitri/{id}/modifica(id=${arbitro.id})}" class="card-badge badge-yellow" style="text-decoration: none;">Modifica</a>
                            <form th:action="@{/admin/arbitri/{id}/elimina(id=${arbitro.id})}" method="post" class="inline-action-form">
                                <button type="submit" class="card-badge badge-red" style="border: none; cursor: pointer;" onclick="return confirm('Eliminare questo arbitro?')">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(arbitri)}" class="empty-state">
        Nessun arbitro presente.
    </div>

    <a th:href="@{/tornei}" class="muted-action" style="margin-top: 20px;">Torna ai tornei</a>
</section>
</body>
</html>
