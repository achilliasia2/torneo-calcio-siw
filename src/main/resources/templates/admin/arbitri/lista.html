<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
        <span class="section-title">Gestione Arbitri</span>
        <a th:href="@{/admin/arbitri/nuovo}" class="card-badge badge-blue" style="text-decoration: none; margin: 0;">
            + Nuovo Arbitro
        </a>
    </div>

    <div class="card" style="padding: 0; overflow: hidden; border-radius: 12px;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                <tr>
                    <th style="padding: 12px 16px; text-align: left; color: #64748b; font-size: 12px; text-transform: uppercase; font-weight: 500;">Nome / Cognome</th>
                    <th style="padding: 12px 16px; text-align: left; color: #64748b; font-size: 12px; text-transform: uppercase; font-weight: 500;">Codice Arbitrale</th>
                    <th style="padding: 12px 16px; text-align: right; color: #64748b; font-size: 12px; text-transform: uppercase; font-weight: 500;">Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="arbitro : ${arbitri}" style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 16px;">
                        <span style="font-weight: 600; color: #1e293b;" th:text="${arbitro.cognome} + ' ' + ${arbitro.nome}"></span>
                    </td>
                    <td style="padding: 12px 16px;">
                        <code style="background: #f1f5f9; padding: 4px 8px; border-radius: 6px; color: #475569; font-weight: 500;" th:text="${arbitro.codiceArbitrale}">REF123</code>
                    </td>
                    <td style="padding: 12px 16px; text-align: right;">
                        <a th:href="@{/admin/arbitri/{id}/modifica(id=${arbitro.id})}" 
                           style="color: #2563eb; text-decoration: none; font-weight: 500; font-size: 13px;">Modifica</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(arbitri)}">
                    <td colspan="3" style="padding: 24px; text-align: center; color: #94a3b8; font-size: 13px;">Nessun arbitro presente.</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <a th:href="@{/tornei}" class="see-all" style="display:inline-block; margin-top:15px;">← Torna ai tornei</a>
</section>
</body>
</html>
