<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1 th:text="${giocatore.id == null} ? 'Nuovo giocatore' : 'Modifica giocatore'">Form Giocatore</h1>
        <p>Squadra: <strong th:text="${squadra.nome}">Nome squadra</strong></p>
    </div>

    <div class="form-panel">
        <form th:action="${giocatore.id == null} ? @{/admin/squadre/{sid}/giocatori/nuovo(sid=${squadra.id})} : @{/admin/giocatori/{id}/modifica(id=${giocatore.id})}"
              th:object="${giocatore}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Controlla i dati inseriti.
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                <div class="form-field">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" required>
                </div>
                <div class="form-field">
                    <label>Cognome</label>
                    <input type="text" th:field="*{cognome}" required>
                </div>
            </div>

            <div class="form-field">
                <label>Data di nascita</label>
                <input type="date" th:field="*{dataNascita}" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                <div class="form-field">
                    <label>Ruolo</label>
                    <select th:field="*{ruolo}" required>
                        <option value="">-- Ruolo --</option>
                        <option value="Portiere">Portiere</option>
                        <option value="Difensore">Difensore</option>
                        <option value="Centrocampista">Centrocampista</option>
                        <option value="Attaccante">Attaccante</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Altezza (cm)</label>
                    <input type="number" th:field="*{altezza}" step="0.1" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-action" style="flex: 2;">Salva giocatore</button>
                <a th:href="@{/squadre/{id}(id=${squadra.id})}" class="muted-action" style="flex: 1; text-align: center;">Annulla</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
