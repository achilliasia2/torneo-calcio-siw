<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Nuova partita</h1>
        <p>Programma una gara scegliendo torneo, squadre, luogo, data e arbitro.</p>
    </div>

    <div class="form-panel">
        <form th:action="@{/admin/partite/nuova}" th:object="${partita}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Controlla i dati inseriti.
            </div>

            <div class="form-field">
                <label>Data e ora</label>
                <input type="datetime-local" th:field="*{dataOra}" required>
            </div>

            <div class="form-field">
                <label>Luogo</label>
                <input type="text" th:field="*{luogo}" placeholder="Es. Campo Centrale" required>
            </div>

            <div class="form-field">
                <label>Torneo</label>
                <input th:if="${torneoSelezionatoId != null}" type="hidden" name="torneo" th:value="${torneoSelezionatoId}">
                <select th:if="${torneoSelezionatoId == null}" th:field="*{torneo}" required>
                    <option value="">-- Seleziona torneo --</option>
                    <option th:each="t : ${tornei}" th:value="${t.id}" th:text="${t.nome}"></option>
                </select>
                <input th:if="${torneoSelezionatoId != null}" type="text" th:value="*{torneo.nome}" readonly>
            </div>

            <div th:if="${torneoSelezionatoId == null}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Per creare una partita, entra nel dettaglio di un torneo e usa il pulsante Nuova partita.
            </div>

            <div th:if="${torneoSelezionatoId != null and #lists.size(squadre) < 2}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Devi iscrivere almeno due squadre al torneo prima di creare una partita.
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                <div class="form-field">
                    <label>Squadra casa</label>
                    <select th:field="*{squadraHome}" required>
                        <option value="">-- Seleziona --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Squadra ospite</label>
                    <select th:field="*{squadraAway}" required>
                        <option value="">-- Seleziona --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
            </div>

            <div class="form-field">
                <label>Arbitro</label>
                <select th:field="*{arbitro}" required>
                    <option value="">-- Seleziona arbitro --</option>
                    <option th:each="a : ${arbitri}" th:value="${a.id}" th:text="${a.cognome + ' ' + a.nome}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-action" style="flex: 2;" th:disabled="${torneoSelezionatoId == null or #lists.size(squadre) < 2}">Salva partita</button>
                <a th:href="@{/tornei}" class="muted-action" style="flex: 1; text-align: center;">Annulla</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
