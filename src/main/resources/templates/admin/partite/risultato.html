<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Inserisci risultato</h1>
        <p>Registra il punteggio finale della partita.</p>
    </div>

    <div class="form-panel" style="text-align: center;">
        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: center; margin-bottom: 26px;">
            <div>
                <h2 th:text="${partita.squadraHome.nome}">Casa</h2>
                <span class="card-badge badge-blue">Casa</span>
            </div>
            <div style="background: #1e3a8a; color: white; border-radius: 12px; font-size: 22px; font-weight: 800; padding: 10px 16px;">VS</div>
            <div>
                <h2 th:text="${partita.squadraAway.nome}">Ospite</h2>
                <span class="card-badge badge-green">Ospite</span>
            </div>
        </div>

        <form th:action="@{/admin/partite/{id}/risultato(id=${partita.id})}" method="post">
            <div th:if="${errore}" th:text="${errore}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;"></div>

            <div style="display: flex; gap: 18px; justify-content: center; margin-bottom: 24px;">
                <div class="form-field" style="max-width: 120px;">
                    <label>Gol casa</label>
                    <input type="number" name="goalsHome" min="0" required style="font-size: 24px; font-weight: 800; text-align: center;">
                </div>
                <div class="form-field" style="max-width: 120px;">
                    <label>Gol ospiti</label>
                    <input type="number" name="goalsAway" min="0" required style="font-size: 24px; font-weight: 800; text-align: center;">
                </div>
            </div>

            <button type="submit" class="btn-action" style="width: 100%;">Conferma risultato</button>
            <a th:href="@{/tornei}" class="muted-action" style="display: block; margin-top: 12px; text-align: center;">Annulla</a>
        </form>
    </div>
</section>
</body>
</html>
