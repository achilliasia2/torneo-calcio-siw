<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header">
        <span class="section-title">Inserimento Risultato</span>
    </div>

    <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <div style="display: flex; justify-content: space-around; align-items: center; margin-bottom: 30px;">
            <div style="flex: 1;">
                <div style="font-weight: 700; font-size: 18px; color: #1e293b;" th:text="${partita.squadraHome.nome}"></div>
                <div style="font-size: 12px; color: #64748b;">CASA</div>
            </div>
            <div style="font-weight: 900; font-size: 24px; color: #cbd5e1;">VS</div>
            <div style="flex: 1;">
                <div style="font-weight: 700; font-size: 18px; color: #1e293b;" th:text="${partita.squadraAway.nome}"></div>
                <div style="font-size: 12px; color: #64748b;">OSPITE</div>
            </div>
        </div>

        <form th:action="@{/admin/partite/{id}/risultato(id=${partita.id})}" method="post">
            <div th:if="${errore}" th:text="${errore}" style="margin-bottom: 15px; padding: 12px; border-radius: 8px; background: #fee2e2; color: #991b1b; font-size: 13px;"></div>
            <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 25px;">
                <div style="text-align: left;">
                    <label style="display:block; font-size:11px; color:#64748b; margin-bottom:5px;">Gol Casa</label>
                    <input type="number" name="goalsHome" style="width:80px; padding:12px; border:2px solid #e2e8f0; border-radius:12px; text-align:center; font-size:20px; font-weight:700;" min="0" required>
                </div>
                <div style="text-align: left;">
                    <label style="display:block; font-size:11px; color:#64748b; margin-bottom:5px;">Gol Ospiti</label>
                    <input type="number" name="goalsAway" style="width:80px; padding:12px; border:2px solid #e2e8f0; border-radius:12px; text-align:center; font-size:20px; font-weight:700;" min="0" required>
                </div>
            </div>

            <button type="submit" class="card-btn" style="width: 100%; border: none; cursor: pointer; padding: 15px;">Conferma Risultato</button>
            <a th:href="@{/tornei}" style="display: block; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 13px;">Annulla e torna indietro</a>
        </form>
    </div>
</section>
</body>
</html>
