<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1 th:text="${squadra.id == null} ? 'Nuova squadra' : 'Modifica squadra'">Form Squadra</h1>
        <p>Inserisci nome, citta e anno di fondazione della squadra.</p>
    </div>

    <div class="form-panel">
        <form th:action="${squadra.id == null} ? @{/admin/squadre/nuova} : @{/admin/squadre/{id}/modifica(id=${squadra.id})}" th:object="${squadra}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Controlla i dati inseriti.
            </div>

            <div class="form-field">
                <label>Nome squadra</label>
                <input type="text" th:field="*{nome}" required>
            </div>
            <div class="form-field">
                <label>Citta</label>
                <input type="text" th:field="*{citta}" required>
            </div>
            <div class="form-field">
                <label>Anno di fondazione</label>
                <input type="number" th:field="*{annoFondazione}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-action" style="flex: 2;">Salva squadra</button>
                <a th:href="@{/squadre}" class="muted-action" style="flex: 1; text-align: center;">Annulla</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
