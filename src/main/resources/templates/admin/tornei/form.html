<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1 th:text="${torneo.id == null} ? 'Nuovo Torneo' : 'Modifica Torneo'">Form Torneo</h1>
        <p>Inserisci le informazioni principali del torneo e prepara la competizione.</p>
    </div>

    <div class="form-panel">
        <form th:action="${torneo.id == null} ? @{/admin/tornei/nuovo} : @{/admin/tornei/{id}/modifica(id=${torneo.id})}" th:object="${torneo}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Controlla i dati inseriti.
            </div>
            <div class="form-field">
                <label>Nome torneo</label>
                <input type="text" th:field="*{nome}" required>
            </div>
            <div class="form-field">
                <label>Anno</label>
                <input type="number" th:field="*{anno}" required>
            </div>
            <div class="form-field">
                <label>Descrizione</label>
                <textarea th:field="*{descrizione}" rows="5" maxlength="2000" placeholder="Descrivi il torneo, le regole principali o le informazioni utili per i partecipanti."></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-action" style="flex: 2;">Salva torneo</button>
                <a th:href="@{/tornei}" class="muted-action" style="flex: 1; text-align: center;">Annulla</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
