<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header">
        <span class="section-title" th:text="${torneo.id == null} ? 'Nuovo Torneo' : 'Modifica Torneo'">Form Torneo</span>
    </div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <form th:action="${torneo.id == null} ? @{/admin/tornei/nuovo} : @{/admin/tornei/{id}/modifica(id=${torneo.id})}" th:object="${torneo}" method="post">
            <div th:if="${#fields.hasErrors('*')}" style="margin-bottom: 15px; padding: 12px; border-radius: 8px; background: #fee2e2; color: #991b1b; font-size: 13px;">
                Controlla i dati inseriti.
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Nome Torneo</label>
                <input type="text" th:field="*{nome}" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Anno</label>
                <input type="number" th:field="*{anno}" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Descrizione</label>
                <textarea th:field="*{descrizione}" rows="4" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px; font-family: inherit;"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="card-btn" style="flex: 2; border: none; cursor: pointer;">Salva Torneo</button>
                <a th:href="@{/tornei}" style="flex: 1; text-align: center; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; text-decoration: none; color: #64748b; font-size: 14px;">Annulla</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
