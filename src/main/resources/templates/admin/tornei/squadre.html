<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Squadre del torneo</h1>
        <p th:text="${torneo.nome}">Nome torneo</p>
    </div>

    <div class="management-grid">
        <div>
            <div class="section-header">
                <span class="section-title">Squadre iscritte</span>
            </div>
            <div class="sport-table-card" th:if="${!#lists.isEmpty(squadreIscritte)}">
                <table class="sport-table compact-table">
                    <thead>
                        <tr>
                            <th>Squadra</th>
                            <th>Citta</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="squadra : ${squadreIscritte}">
                            <td><strong th:text="${squadra.nome}">Squadra</strong></td>
                            <td th:text="${squadra.citta}">Citta</td>
                            <td>
                                <form th:action="@{/admin/tornei/{tid}/squadre/{sid}/rimuovi(tid=${torneo.id},sid=${squadra.id})}" method="post" style="margin: 0;">
                                    <button class="card-badge badge-red" style="border: none; cursor: pointer;" onclick="return confirm('Rimuovere questa squadra?')">Rimuovi</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${#lists.isEmpty(squadreIscritte)}" class="empty-state">
                Nessuna squadra iscritta.
            </div>
        </div>

        <div>
            <div class="section-header">
                <span class="section-title">Squadre disponibili</span>
            </div>
            <div class="sport-table-card">
                <table class="sport-table compact-table">
                    <thead>
                        <tr>
                            <th>Squadra</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="squadra : ${tutteLeSquadre}" th:unless="${#lists.contains(squadreIscritte.![id], squadra.id)}">
                            <td><strong th:text="${squadra.nome}">Squadra</strong></td>
                            <td>
                                <form th:action="@{/admin/tornei/{tid}/squadre/{sid}/aggiungi(tid=${torneo.id},sid=${squadra.id})}" method="post" style="margin: 0;">
                                    <button class="card-badge badge-green" style="border: none; cursor: pointer;">Iscrivi</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="muted-action" style="margin-top: 20px;">Torna al dettaglio torneo</a>
</section>
</body>
</html>
