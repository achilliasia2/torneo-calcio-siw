<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header">
        <div>
            <span class="section-title">Gestione Squadre Torneo</span>
            <p style="font-size: 14px; color: #64748b;" th:text="${torneo.nome}"></p>
        </div>
    </div>

    <div class="card" style="padding: 0; margin-bottom: 30px; overflow: hidden;">
        <div style="padding: 16px; background: #f8fafc; border-bottom: 1px solid #eee; font-weight: 600; color: #475569;">
            Squadre Iscritte
        </div>
        <table style="width: 100%; border-collapse: collapse;">
            <tbody>
                <tr th:each="squadra : ${squadreIscritte}" style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 16px;">
                        <span style="font-weight: 600;" th:text="${squadra.nome}"></span>
                        <span style="font-size: 12px; color: #94a3b8; margin-left: 8px;" th:text="${squadra.citta}"></span>
                    </td>
                    <td style="padding: 12px 16px; text-align: right;">
                        <form th:action="@{/admin/tornei/{tid}/squadre/{sid}/rimuovi(tid=${torneo.id},sid=${squadra.id})}" method="post" style="margin: 0;">
                            <button class="card-badge badge-purple" style="border: none; cursor: pointer;" onclick="return confirm('Rimuovere questa squadra?')">Rimuovi</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(squadreIscritte)}">
                    <td colspan="2" style="padding: 20px; text-align: center; color: #94a3b8;">Nessuna squadra iscritta.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <div style="padding: 16px; background: #f8fafc; border-bottom: 1px solid #eee; font-weight: 600; color: #475569;">
            Aggiungi Squadra
        </div>
        <table style="width: 100%; border-collapse: collapse;">
            <tbody>
                <tr th:each="squadra : ${tutteLeSquadre}" th:unless="${#lists.contains(squadreIscritte.![id], squadra.id)}" style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 16px;">
                        <span style="font-weight: 500;" th:text="${squadra.nome}"></span>
                    </td>
                    <td style="padding: 12px 16px; text-align: right;">
                        <form th:action="@{/admin/tornei/{tid}/squadre/{sid}/aggiungi(tid=${torneo.id},sid=${squadra.id})}" method="post">
                            <button class="card-badge badge-blue" style="border: none; cursor: pointer;">+ Iscrivi</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="see-all" style="display: inline-block; margin-top: 20px;">← Torna al dettaglio torneo</a>
</section>
</body>
</html>
