<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section style="display: flex; justify-content: center; padding: 60px 0;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 32px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <h2 style="font-size: 24px; color: #1e293b; margin-bottom: 8px;">Bentornato</h2>
            <p style="color: #64748b; font-size: 14px;">Inserisci le tue credenziali per accedere</p>
        </div>

        <div th:if="${param.error}" style="background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center;">
            Username o password errati.
        </div>

        <form th:action="@{/login}" method="post">
            <div style="margin-bottom: 16px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Username</label>
                <input type="text" name="username" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px;" required autofocus>
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Password</label>
                <input type="password" name="password" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px;" required>
            </div>
            
            <button type="submit" class="card-btn" style="width: 100%; border: none; padding: 14px; font-size: 15px;">Accedi</button>
        </form>

        <div style="text-align: center; margin-top: 24px; font-size: 14px;">
            <span style="color: #64748b;">Non hai un account?</span>
            <a th:href="@{/registrazione}" style="color: #2563eb; text-decoration: none; font-weight: 600;">Registrati</a>
        </div>
    </div>
</section>
</body>
</html>
