<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Accedi</h1>
        <p>Entra nel sito per seguire i tornei, commentare le partite e gestire i dati se sei amministratore.</p>
    </div>

    <div class="form-panel">
        <h2>Bentornato</h2>
        <p>Inserisci username e password.</p>

        <div th:if="${param.error}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
            Username o password errati.
        </div>

        <form action="/login" method="post">
            <div class="form-field">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-action" style="width: 100%;">Accedi</button>
        </form>

        <div style="text-align: center; margin-top: 22px; font-size: 14px;">
            <span style="color: #64748b;">Non hai un account?</span>
            <a th:href="@{/registrazione}" style="color: #1d4ed8; font-weight: 700; text-decoration: none;">Registrati</a>
        </div>
    </div>
</section>
</body>
</html>
