<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Crea account</h1>
        <p>Registrati per accedere alle funzioni del sito e partecipare alla vita dei tornei.</p>
    </div>

    <div class="form-panel">
        <h2>Registrazione</h2>
        <p>Scegli username e password.</p>

        <form th:action="@{/registrazione}" th:object="${utente}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Controlla username e password.
            </div>

            <div class="form-field">
                <label>Username</label>
                <input type="text" th:field="*{username}" required>
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" th:field="*{password}" required>
            </div>

            <button type="submit" class="btn-action" style="width: 100%; background: #16a34a;">Registrati</button>
        </form>

        <div style="text-align: center; margin-top: 22px; font-size: 14px;">
            <span style="color: #64748b;">Hai gia un account?</span>
            <a th:href="@{/login}" style="color: #1d4ed8; font-weight: 700; text-decoration: none;">Accedi</a>
        </div>
    </div>
</section>
</body>
</html>
