<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section style="display: flex; justify-content: center; padding: 40px 0;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 32px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <h2 style="font-size: 24px; color: #1e293b; margin-bottom: 8px;">Crea Account</h2>
            <p style="color: #64748b; font-size: 14px;">Unisciti alla nostra community sportiva</p>
        </div>

        <form th:action="@{/registrazione}" th:object="${utente}" method="post">
            <div th:if="${#fields.hasErrors('*')}" style="margin-bottom: 15px; padding: 12px; border-radius: 8px; background: #fee2e2; color: #991b1b; font-size: 13px;">
                Controlla username e password.
            </div>
            <div style="margin-bottom: 16px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Username</label>
                <input type="text" th:field="*{username}" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px;" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display:block; font-size:12px; color:#64748b; margin-bottom:5px;">Password</label>
                <input type="password" th:field="*{password}" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:8px;" required>
            </div>
            
            <button type="submit" class="card-btn" style="width: 100%; border: none; padding: 14px; font-size: 15px; background: #10b981;">Registrati</button>
        </form>

        <div style="text-align: center; margin-top: 24px; font-size: 14px;">
            <span style="color: #64748b;">Hai già un account?</span>
            <a th:href="@{/login}" style="color: #2563eb; text-decoration: none; font-weight: 600;">Accedi</a>
        </div>
    </div>
</section>
</body>
</html>
