<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Commento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Modifica Commento</h2>
    <form th:action="@{/commenti/{id}/modifica(id=${commento.id})}"
          th:object="${commento}" method="post">
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            Il commento non puo essere vuoto.
        </div>
        <div class="mb-3">
            <label class="form-label">Testo</label>
            <textarea th:field="*{testo}" class="form-control" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-success">Salva</button>
    </form>
</div>
</body>
</html>
