<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Modifica commento</h1>
        <p>Aggiorna il testo del tuo commento sulla partita.</p>
    </div>

    <div class="form-panel">
        <form th:action="@{/commenti/{id}/modifica(id=${commento.id})}" th:object="${commento}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;">
                Il commento non puo essere vuoto.
            </div>

            <div class="form-field">
                <label>Testo</label>
                <textarea th:field="*{testo}" rows="4" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-action" style="flex: 2;">Salva commento</button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
