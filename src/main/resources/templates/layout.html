<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="i_mio_layout(cont_pag)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tornei Calcio 2026</title>
    <style>
        :root { 
            --primary: #1d4ed8; 
            --primary-hover: #1e40af; 
            --accent: #16a34a;
            --accent-soft: #dcfce7;
            --bg-light: #f7f9fb; 
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1f2937;
            --text-muted: #64748b;
            --danger: #dc2626;
            --warning: #ca8a04;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background:
                radial-gradient(circle at top left, rgba(22, 163, 74, 0.12), transparent 320px),
                linear-gradient(180deg, #edf7f1 0, #f7f9fb 340px);
            color: var(--text-main);
            line-height: 1.5;
        }
        
        /* NAVBAR */
        .nav { background: linear-gradient(135deg, #1d4ed8 0%, #15803d 100%); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12); }
        .nav-brand { color: white; font-size: 18px; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-link { color: rgba(255,255,255,0.86); font-size: 14px; padding: 7px 12px; border-radius: 6px; text-decoration: none; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.14); color: white; }
        .nav-btn { background: white; color: #1e40af; font-size: 13px; font-weight: 700; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; text-decoration: none; }
        .nav-btn:hover { background: #eff6ff; }

        /* HERO SECTION */
        .hero { background: linear-gradient(135deg, #1d4ed8 0%, #15803d 100%); padding: 64px 24px; text-align: center; color: white; }
        .hero h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        .hero p { font-size: 16px; opacity: 0.9; margin-bottom: 32px; max-width: 500px; margin-left: auto; margin-right: auto; }
        
        .stats { display: flex; gap: 40px; justify-content: center; }
        .stat { text-align: center; }
        .stat-num { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 13px; opacity: 0.8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* CONTENT AREA OPTIMIZED */
        .content { 
            padding: 32px 24px; 
            max-width: 1100px; 
            margin: 0 auto; 
            min-height: calc(100vh - 60px); 
        }
        
        /* COMMON UI COMPONENTS */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 20px; font-weight: 700; color: var(--text-main); }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(15,23,42,0.04); }
        .btn-action, .card-btn { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.2s, transform 0.2s; }
        .btn-action:hover, .card-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .see-all { color: var(--text-muted); font-weight: 600; text-decoration: none; }
        .see-all:hover { color: var(--primary); }

        .page-hero {
            background:
                linear-gradient(135deg, rgba(29,78,216,0.94), rgba(22,163,74,0.88)),
                radial-gradient(circle at top right, rgba(250,204,21,0.36), transparent 220px);
            border-radius: 18px;
            box-shadow: 0 18px 42px rgba(15,23,42,0.18);
            color: white;
            margin-bottom: 24px;
            overflow: hidden;
            padding: 30px;
            position: relative;
        }
        .page-hero h1 {
            font-size: 34px;
            line-height: 1.1;
            margin-bottom: 10px;
        }
        .page-hero p {
            color: rgba(255,255,255,0.84);
            font-size: 15px;
            line-height: 1.7;
            max-width: 660px;
        }
        .page-hero-badge {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            color: #1e40af;
            font-size: 18px;
            font-weight: 850;
            padding: 10px 14px;
            position: absolute;
            right: 24px;
            top: 24px;
        }
        .sport-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
        .sport-card {
            background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%);
            border: 1px solid #bfdbfe;
            border-radius: 16px;
            box-shadow: 0 14px 34px rgba(15,23,42,0.08);
            padding: 22px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .sport-card:hover {
            border-color: #60a5fa;
            box-shadow: 0 22px 44px rgba(15,23,42,0.14);
            transform: translateY(-3px);
        }
        .sport-card.green {
            background: linear-gradient(180deg, #ffffff 0%, #ecfdf5 100%);
            border-color: #bbf7d0;
        }
        .team-card {
            background:
                linear-gradient(135deg, rgba(255,255,255,0.94), rgba(236,253,245,0.92)),
                radial-gradient(circle at top right, rgba(29,78,216,0.12), transparent 150px);
            min-height: 160px;
            position: relative;
            overflow: hidden;
        }
        .team-card::after {
            content: "";
            position: absolute;
            right: -52px;
            bottom: -66px;
            width: 150px;
            height: 150px;
            border: 24px solid rgba(22,163,74,0.10);
            border-radius: 50%;
        }
        .home-tournament-card {
            background:
                linear-gradient(180deg, #ffffff 0%, #eff6ff 100%),
                radial-gradient(circle at top right, rgba(22,163,74,0.12), transparent 150px);
            min-height: 190px;
        }
        .card-description {
            display: -webkit-box;
            line-height: 1.6;
            overflow: hidden;
            overflow-wrap: anywhere;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
        }
        .sport-card-link {
            color: inherit;
            display: block;
            min-height: 116px;
            margin: -22px;
            padding: 22px;
            position: relative;
            text-decoration: none;
            z-index: 1;
        }
        .sport-card-link:hover h3 {
            color: var(--primary);
        }
        .team-details {
            display: grid;
            background: rgba(255,255,255,0.76);
            border: 1px solid #bfdbfe;
            border-radius: 14px;
            box-shadow: 0 10px 26px rgba(15,23,42,0.06);
            gap: 0;
            grid-template-columns: repeat(3, 1fr);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .team-detail-item {
            padding: 16px 18px;
        }
        .team-detail-item + .team-detail-item {
            border-left: 1px solid #dbeafe;
        }
        .team-detail-label {
            color: #64748b;
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .team-detail-value {
            color: #1e3a8a;
            font-size: 18px;
            font-weight: 800;
        }
        .sport-table-card {
            background: white;
            border: 1px solid #bfdbfe;
            border-radius: 16px;
            box-shadow: 0 14px 34px rgba(15,23,42,0.08);
            overflow-x: auto;
        }
        .sport-table {
            border-collapse: collapse;
            min-width: 640px;
            width: 100%;
        }
        .sport-table.compact-table {
            min-width: 0;
        }
        .sport-table thead tr {
            background: linear-gradient(135deg, #eff6ff 0%, #ecfdf5 100%);
            border-bottom: 1px solid #bfdbfe;
        }
        .sport-table th {
            color: #1e3a8a;
            font-size: 12px;
            padding: 14px 16px;
            text-align: left;
            text-transform: uppercase;
        }
        .sport-table td {
            border-bottom: 1px solid #edf2f7;
            padding: 14px 16px;
            overflow-wrap: anywhere;
        }
        .form-panel {
            background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%);
            border: 1px solid #bfdbfe;
            border-radius: 16px;
            box-shadow: 0 16px 34px rgba(15,23,42,0.08);
            margin: 0 auto;
            max-width: 640px;
            padding: 24px;
        }
        .form-panel h2 {
            color: #1e3a8a;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .form-panel p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .form-field {
            margin-bottom: 16px;
        }
        .form-field label {
            color: #1e3a8a;
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .form-field input,
        .form-field select,
        .form-field textarea {
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            font-size: 14px;
            padding: 12px;
            width: 100%;
        }
        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(29,78,216,0.12);
            outline: none;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }
        .muted-action {
            background: white;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            color: #1e40af;
            display: inline-block;
            font-weight: 700;
            padding: 10px 18px;
            text-decoration: none;
        }
        button.muted-action {
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            min-height: 43px;
        }
        .inline-action-form {
            display: flex;
            margin: 0;
        }
        .danger-action {
            border-color: #fecaca;
            color: #991b1b;
        }
        .empty-state {
            background: rgba(255,255,255,0.72);
            border: 1px dashed #93c5fd;
            border-radius: 14px;
            color: var(--text-muted);
            padding: 34px;
            text-align: center;
        }
        .detail-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: 1.1fr 0.9fr;
        }
        .management-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
		
        /* TABLES */
		.card-table { width: 100%; border-collapse: collapse; }
		.card-table th { text-align: left; padding: 12px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface-muted); }
		.card-table td { padding: 14px 12px; font-size: 14px; border-bottom: 1px solid #edf2f7; }
        
        /* BADGES */
		.card-badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
		.badge-blue { background: #dbeafe; color: #1e40af; }
		.badge-purple { background: #eef2ff; color: #3730a3; }
		.badge-green { background: var(--accent-soft); color: #166534; }
		.badge-yellow { background: #fef9c3; color: var(--warning); }
		.badge-red { background: #fee2e2; color: #991b1b; }

        @media (max-width: 760px) {
            .nav { height: auto; padding: 14px 18px; align-items: flex-start; gap: 12px; flex-direction: column; }
            .nav-links { flex-wrap: wrap; }
            .stats { gap: 18px; flex-wrap: wrap; }
            .content { padding: 24px 16px; }
            .detail-grid { grid-template-columns: 1fr; }
            .management-grid { grid-template-columns: 1fr; }
            .page-hero { padding: 24px; }
            .page-hero h1 { font-size: 28px; }
            .page-hero-badge { display: inline-block; margin-top: 18px; position: static; }
            .form-actions { flex-direction: column; }
            .team-details { grid-template-columns: 1fr; }
            .team-detail-item + .team-detail-item { border-left: none; border-top: 1px solid #dbeafe; }
        }
    </style>
</head>
<body>

<div class="nav">
    <a class="nav-brand" th:href="@{/}">Tornei Calcio</a>
    <div class="nav-links">
        <a class="nav-link" th:href="@{/tornei}">Tornei</a>
        <a class="nav-link" th:href="@{/squadre}">Squadre</a>
        <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/arbitri}">Arbitri</a>
        
        <a sec:authorize="isAnonymous()" class="nav-btn" th:href="@{/login}">Accedi</a>
        
        <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 15px; margin-left: 10px;">
            <span style="color: white; font-size: 14px;">
                Ciao, <strong sec:authentication="name">User</strong>
            </span>
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="nav-link" style="background:rgba(255,255,255,0.12); border:none; cursor:pointer; padding: 7px 12px; border-radius: 6px;">Esci</button>
            </form>
        </div>
    </div>
</div>

<div class="hero" th:if="${isHome}">
    <h1>Benvenuto nei Tornei di Calcio</h1>
    <p>Gestisci tornei, squadre, partite e classifiche in un unico posto professionale e veloce.</p>
    <div class="stats">
        <div class="stat">
            <div class="stat-num" th:text="${numeroTornei ?: '0'}">0</div>
            <div class="stat-label">Tornei</div>
        </div>
        <div class="stat">
            <div class="stat-num" th:text="${numeroSquadre ?: '0'}">0</div>
            <div class="stat-label">Squadre</div>
        </div>
        <div class="stat">
            <div class="stat-num" th:text="${numeroPartite ?: '0'}">0</div>
            <div class="stat-label">Partite</div>
        </div>
    </div>
</div>

<div class="content">
    <div th:replace="${cont_pag}"></div>
</div>

</body>
</html>
