<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Calendario</h1>
        <p th:text="${torneo.nome}">Nome torneo</p>
        <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="page-hero-badge" style="text-decoration: none;">Torneo</a>
    </div>

    <div class="sport-table-card">
        <table class="sport-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Partita</th>
                    <th style="text-align: center;">Risultato</th>
                    <th style="text-align: right;">Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="partita : ${partite}">
                    <td>
                        <div style="font-weight: 800; color: #0f172a;" th:text="${#temporals.format(partita.dataOra, 'dd MMM HH:mm')}"></div>
                        <div style="font-size: 12px; color: #64748b;" th:text="${partita.luogo}"></div>
                    </td>
                    <td>
                        <span style="font-weight: 800;" th:text="${partita.squadraHome.nome}"></span>
                        <span style="color: #94a3b8; margin: 0 6px;">vs</span>
                        <span style="font-weight: 800;" th:text="${partita.squadraAway.nome}"></span>
                    </td>
                    <td style="text-align: center;">
                        <span th:if="${partita.stato?.name() == 'PLAYED'}"
                              class="card-badge badge-green"
                              th:text="${partita.goalsHome + ' - ' + partita.goalsAway}"></span>
                        <span th:if="${partita.stato?.name() != 'PLAYED'}" class="card-badge badge-blue">Programmata</span>
                    </td>
                    <td style="text-align: right;">
                        <div style="display: flex; gap: 8px; justify-content: flex-end;">
                            <a th:href="@{/partite/{id}(id=${partita.id})}" class="card-badge badge-blue" style="text-decoration: none;">Dettagli</a>
                            <th:block sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/admin/partite/{id}/risultato(id=${partita.id})}" class="card-badge badge-green" style="text-decoration: none;">Risultato</a>
                            </th:block>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="see-all" style="display: inline-block; margin-top: 20px;">&larr; Torna al torneo</a>
</section>
</body>
</html>
