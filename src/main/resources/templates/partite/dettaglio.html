<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <span class="page-hero-badge" th:text="${#temporals.format(partita.dataOra, 'dd/MM')}">Data</span>
        <h1>Dettaglio partita</h1>
        <p th:text="${#temporals.format(partita.dataOra, 'dd MMMM yyyy - HH:mm')}">Data e ora</p>
    </div>

    <div class="sport-card" style="text-align: center; margin-bottom: 26px;">
        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 22px; align-items: center;">
            <div style="text-align: right;">
                <span class="card-badge badge-blue">Casa</span>
                <h2 style="font-size: 26px; color: #1e3a8a; margin-top: 8px;" th:text="${partita.squadraHome.nome}">Squadra casa</h2>
            </div>
            <div style="background: linear-gradient(135deg, #1d4ed8, #16a34a); color: white; border-radius: 16px; font-size: 30px; font-weight: 900; min-width: 110px; padding: 14px 18px;">
                <span th:text="${partita.stato?.name() == 'PLAYED' ? partita.goalsHome + ' - ' + partita.goalsAway : 'VS'}">VS</span>
            </div>
            <div style="text-align: left;">
                <span class="card-badge badge-green">Ospite</span>
                <h2 style="font-size: 26px; color: #166534; margin-top: 8px;" th:text="${partita.squadraAway.nome}">Squadra ospite</h2>
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; margin-top: 26px; color: #475569;">
            <span><strong>Luogo:</strong> <span th:text="${partita.luogo}">Campo</span></span>
            <span><strong>Arbitro:</strong> <span th:text="${partita.arbitro.cognome + ' ' + partita.arbitro.nome}">Arbitro</span></span>
        </div>
    </div>

    <div class="section-header">
        <span class="section-title">Commenti</span>
    </div>

    <div th:if="${!#lists.isEmpty(commenti)}" style="display: grid; gap: 12px;">
        <div th:each="commento : ${commenti}" class="sport-card">
            <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 8px;">
                <strong style="color: #1d4ed8;" th:text="${commento.utente.username}">utente</strong>
                <span style="font-size: 12px; color: #64748b;" th:text="${#temporals.format(commento.dataCreazione, 'dd/MM HH:mm')}">data</span>
            </div>
            <p style="color: #334155;" th:text="${commento.testo}">Testo commento</p>

            <div sec:authorize="isAuthenticated()" th:if="${commento.utente.username == #authentication.name}" style="margin-top: 12px; text-align: right;">
                <a th:href="@{/commenti/{id}/modifica(id=${commento.id})}" class="card-badge badge-yellow" style="text-decoration: none;">Modifica</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(commenti)}" class="empty-state">
        Nessun commento per questa partita. Sii il primo a scrivere.
    </div>

    <div sec:authorize="isAuthenticated()" class="form-panel" style="margin-top: 22px; max-width: none;">
        <h2>Scrivi un commento</h2>
        <form th:action="@{/commenti/{id}/nuovo(id=${partita.id})}" th:object="${nuovoCommento}" method="post">
            <div class="form-field">
                <label>Commento</label>
                <textarea th:field="*{testo}" rows="3" placeholder="Scrivi un commento..."></textarea>
            </div>
            <button type="submit" class="btn-action">Pubblica commento</button>
        </form>
    </div>
</section>
</body>
</html>
