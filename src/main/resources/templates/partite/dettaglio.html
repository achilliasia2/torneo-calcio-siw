<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="card" style="text-align: center; margin-bottom: 30px; background: linear-gradient(to bottom, #ffffff, #f8fafc);">
        <div style="font-size: 14px; color: #64748b; margin-bottom: 15px;" th:text="${#temporals.format(partita.dataOra, 'dd MMMM yyyy - HH:mm')}"></div>
        
        <div style="display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 20px;">
            <div style="flex: 1; text-align: right;">
                <h2 style="margin:0; font-size: 24px;" th:text="${partita.squadraHome.nome}"></h2>
            </div>
            <div style="background: #1e293b; color: white; padding: 10px 20px; border-radius: 12px; font-size: 28px; font-weight: 800;">
                <span th:text="${partita.stato?.name() == 'PLAYED' ? partita.goalsHome + ' - ' + partita.goalsAway : 'VS'}"></span>
            </div>
            <div style="flex: 1; text-align: left;">
                <h2 style="margin:0; font-size: 24px;" th:text="${partita.squadraAway.nome}"></h2>
            </div>
        </div>
        
        <div style="border-top: 1px solid #e2e8f0; pt: 15px; display: flex; justify-content: center; gap: 30px; font-size: 14px; color: #64748b;">
            <span>📍 <span th:text="${partita.luogo}"></span></span>
            <span>🏁 Arbitro: <span style="font-weight: 600;" th:text="${partita.arbitro.cognome + ' ' + partita.arbitro.nome}"></span></span>
        </div>
    </div>

    <div class="section-header">
        <span class="section-title">Commenti e Discussione</span>
    </div>

    <div th:each="commento : ${commenti}" class="card" style="margin-bottom: 12px; padding: 16px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="font-weight: 700; color: #2563eb; font-size: 14px;" th:text="${commento.utente.username}"></span>
            <span style="font-size: 12px; color: #94a3b8;" th:text="${#temporals.format(commento.dataCreazione, 'dd/MM HH:mm')}"></span>
        </div>
        <p style="margin: 0; color: #334155; line-height: 1.5;" th:text="${commento.testo}"></p>
        
		<div sec:authorize="isAuthenticated()" th:if="${commento.utente.username == #authentication.name}" style="margin-top: 10px; text-align: right;">
		    <a th:href="@{/commenti/{id}/modifica(id=${commento.id})}" style="font-size: 12px; color: #64748b; text-decoration: none;">✏️ Modifica</a>
		</div>
    </div>

    <div th:if="${#lists.isEmpty(commenti)}" style="text-align: center; padding: 40px; color: #94a3b8;">
        Nessun commento per questa partita. Sii il primo a scrivere!
    </div>

    <div sec:authorize="isAuthenticated()" class="card" style="margin-top: 20px; background: #f1f5f9; border: none;">
        <form th:action="@{/commenti/{id}/nuovo(id=${partita.id})}" th:object="${nuovoCommento}" method="post">
            <textarea th:field="*{testo}" rows="3" placeholder="Scrivi un commento..." style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; font-family: inherit;"></textarea>
            <button type="submit" class="card-btn" style="border:none; cursor:pointer;">Pubblica Commento</button>
        </form>
    </div>
</section>
</body>
</html>
