<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header">
        <div>
            <span class="section-title" th:text="${squadra.nome}">Nome Squadra</span>
            <p style="font-size: 14px; color: #64748b;"><span th:text="${squadra.citta}"></span> • Fondata nel <span th:text="${squadra.annoFondazione}"></span></p>
        </div>
        <div sec:authorize="hasRole('ADMIN')" style="display: flex; gap: 8px; align-items: center;">
            <a th:href="@{/admin/squadre/{id}/modifica(id=${squadra.id})}" class="card-badge badge-blue" style="text-decoration: none;">Modifica Squadra</a>
            <form th:action="@{/admin/squadre/{id}/elimina(id=${squadra.id})}" method="post" style="margin: 0;">
                <button type="submit" class="card-badge badge-red" style="border: none; cursor: pointer; text-decoration: none;" onclick="return confirm('Sei sicuro di voler eliminare definitivamente questa squadra e tutti i suoi giocatori?')">
                    Elimina Squadra
                </button>
            </form>
        </div>
    </div>

    <div class="card" style="padding: 0; overflow: hidden; border-radius: 12px;">
        <div style="padding: 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600; color: #475569;">Rosa Giocatori</span>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/squadre/{id}/giocatori/nuovo(id=${squadra.id})}" class="card-badge badge-green" style="text-decoration: none;">+ Aggiungi</a>
        </div>
        <table class="card-table" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f8fafc; border-bottom: 1px solid #e2e8f0; text-align: left;">
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase;">Nome</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase;">Ruolo</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase;">Nascita</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase;">Altezza</th>
                    <th sec:authorize="hasRole('ADMIN')" style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; text-align: right;">Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="giocatore : ${giocatori}" style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 16px;">
                        <div style="font-weight: 600; color: #1e293b;" th:text="${giocatore.cognome + ' ' + giocatore.nome}"></div>
                    </td>
                    <td style="padding: 12px 16px;"><span class="card-badge badge-purple" th:text="${giocatore.ruolo}"></span></td>
                    <td style="padding: 12px 16px; color: #475569;" th:text="${giocatore.dataNascita}"></td>
                    <td style="padding: 12px 16px; color: #475569;" th:text="${giocatore.altezza + ' cm'}"></td>
                    <td sec:authorize="hasRole('ADMIN')" style="padding: 12px 16px; text-align: right;">
                        <div style="display: flex; gap: 6px; justify-content: flex-end; align-items: center;">
                            <a th:href="@{/admin/giocatori/{id}/modifica(id=${giocatore.id})}" class="card-badge badge-yellow" style="text-decoration: none;">✏️</a>
                            <form th:action="@{/admin/giocatori/{id}/elimina(id=${giocatore.id})}" method="post" style="margin:0;">
                                <button type="submit" class="card-badge badge-red" style="border:none; cursor:pointer;" onclick="return confirm('Eliminare giocatore?')">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(giocatori)}">
                    <td colspan="5" style="text-align: center; color: #94a3b8; padding: 40px; font-size: 14px;">Nessun giocatore in rosa.</td>
                </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/squadre}" style="text-decoration: none; color: #64748b; font-size: 14px; display: inline-block; margin-top: 20px;">← Torna alle squadre</a>
</section>
</body>
</html>
