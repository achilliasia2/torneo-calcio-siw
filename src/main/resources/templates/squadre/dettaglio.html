<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1 th:text="${squadra.nome}">Nome Squadra</h1>
        <p>
            <strong>Citta:</strong> <span th:text="${squadra.citta}">Citta</span>
            <span style="margin: 0 8px;">-</span>
            <strong>Anno di fondazione:</strong> <span th:text="${squadra.annoFondazione}">2026</span>
        </p>
    </div>

    <div th:if="${erroreEliminazione}" class="badge-red" style="padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 13px;" th:text="${erroreEliminazione}">
        Errore eliminazione
    </div>

    <div class="section-header">
        <span class="section-title">Giocatori</span>
    </div>

    <div class="sport-table-card">
        <table class="sport-table">
            <thead>
                <tr>
                    <th>Giocatore</th>
                    <th>Ruolo</th>
                    <th>Nascita</th>
                    <th>Altezza</th>
                    <th sec:authorize="hasRole('ADMIN')">Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="giocatore : ${giocatori}">
                    <td><strong th:text="${giocatore.cognome + ' ' + giocatore.nome}">Giocatore</strong></td>
                    <td><span class="card-badge badge-purple" th:text="${giocatore.ruolo}">Ruolo</span></td>
                    <td th:text="${giocatore.dataNascita}">2000-01-01</td>
                    <td th:text="${giocatore.altezza + ' cm'}">180 cm</td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <div style="display: flex; gap: 6px; align-items: center;">
                            <a th:href="@{/admin/giocatori/{id}/modifica(id=${giocatore.id})}" class="card-badge badge-yellow" style="text-decoration: none;">Modifica</a>
                            <form th:action="@{/admin/giocatori/{id}/elimina(id=${giocatore.id})}" method="post" style="margin:0;">
                                <button type="submit" class="card-badge badge-red" style="border:none; cursor:pointer;" onclick="return confirm('Eliminare giocatore?')">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(giocatori)}">
                    <td colspan="5" style="text-align: center; color: #64748b; padding: 32px;">Nessun giocatore in rosa.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-top: 22px; flex-wrap: wrap;">
        <a th:href="@{/squadre}" class="muted-action">Torna alle squadre</a>

        <div sec:authorize="hasRole('ADMIN')" style="display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;">
            <a th:href="@{/admin/squadre/{id}/giocatori/nuovo(id=${squadra.id})}" class="btn-action">Aggiungi giocatore</a>
            <a th:href="@{/admin/squadre/{id}/modifica(id=${squadra.id})}" class="muted-action">Modifica squadra</a>
            <form th:action="@{/admin/squadre/{id}/elimina(id=${squadra.id})}" method="post" class="inline-action-form">
                <button type="submit" class="muted-action danger-action" style="cursor: pointer;" onclick="return confirm('Sei sicuro di voler eliminare questa squadra?')">
                    Elimina squadra
                </button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
