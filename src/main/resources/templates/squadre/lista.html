<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <span class="page-hero-badge" th:text="${#lists.size(squadre)}">0</span>
        <h1>Squadre</h1>
        <p>Tutte le squadre registrate nel sito, con citta, anno di fondazione e rosa dei giocatori.</p>
    </div>

    <div class="section-header">
        <span class="section-title">Elenco squadre</span>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/squadre/nuova}" class="btn-action">Registra squadra</a>
    </div>

    <div class="sport-grid" th:if="${!#lists.isEmpty(squadre)}">
        <div class="sport-card team-card" th:each="squadra : ${squadre}">
            <a th:href="@{/squadre/{id}(id=${squadra.id})}" class="sport-card-link">
                <div style="display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 28px;">
                    <div>
                        <h3 style="font-size: 22px; color: #1e3a8a; margin-bottom: 6px;" th:text="${squadra.nome}">Nome Squadra</h3>
                        <p style="color: #64748b; font-size: 14px;" th:text="${squadra.citta}">Citta</p>
                    </div>
                    <span class="card-badge badge-blue" th:text="${squadra.annoFondazione}">2026</span>
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; color: #475569; font-size: 13px;">
                    <span>Apri scheda squadra</span>
                    <span style="color: #1d4ed8; font-weight: 800;">Dettagli</span>
                </div>
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(squadre)}" class="empty-state">
        Non ci sono ancora squadre iscritte al sistema.
    </div>
</section>
</body>
</html>
