<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header">
        <div>
            <span class="section-title">Classifica Ufficiale</span>
            <p style="font-size: 14px; color: #64748b;" th:text="${torneo.nome}"></p>
        </div>
    </div>

    <div class="card" style="padding: 0; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
            <thead>
                <tr style="background: #f8fafc; border-bottom: 1px solid #e2e8f0; text-align: left;">
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase;">Pos</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase;">Squadra</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; text-align: center;">PT</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; text-align: center;">V</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; text-align: center;">P</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; text-align: center;">S</th>
                    <th style="padding: 12px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; text-align: right;">GF/GS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="riga, i : ${classifica}" style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 12px 16px; font-weight: 600; color: #1e293b;" th:text="${i.count}"></td>
                    
                    <td style="padding: 12px 16px;">
                        <span style="font-weight: 500;" th:text="${riga['squadra']}"></span>
                    </td>
                    
                    <td style="padding: 12px 16px; text-align: center;">
                        <span style="background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-weight: 700; color: #1e293b;" 
                              th:text="${riga['punti']}"></span>
                    </td>
                    
                    <td style="padding: 12px 16px; text-align: center;" th:text="${riga['vittorie']}"></td>
                    <td style="padding: 12px 16px; text-align: center;" th:text="${riga['pareggi']}"></td>
                    <td style="padding: 12px 16px; text-align: center;" th:text="${riga['sconfitte']}"></td>
                    
                    <td style="padding: 12px 16px; text-align: right; font-weight: 600; color: #475569;">
                        <span th:text="${riga['gf']}"></span>
                        <span style="color: #cbd5e1; margin: 0 2px;">-</span>
                        <span th:text="${riga['gs']}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(classifica)}" style="padding: 40px; text-align: center; color: #94a3b8; font-size: 14px;">
            Il torneo non è ancora iniziato o non ci sono partite registrate.
        </div>
    </div>
    
    <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="see-all" style="display: inline-block; margin-top: 20px;">← Torna al torneo</a>
</section>
</body>
</html>
