<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="page-hero">
        <h1>Classifica ufficiale</h1>
        <p th:text="${torneo.nome}">Nome torneo</p>
        <a th:href="@{/react/classifica(torneoId=${torneo.id})}" class="page-hero-badge" style="text-decoration: none;">React</a>
    </div>

    <div class="sport-table-card">
        <table class="sport-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Squadra</th>
                    <th style="text-align: center;">PT</th>
                    <th style="text-align: center;">V</th>
                    <th style="text-align: center;">P</th>
                    <th style="text-align: center;">S</th>
                    <th style="text-align: right;">GF/GS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="riga, i : ${classifica}">
                    <td style="font-weight: 900; color: #1e40af;" th:text="${i.count}"></td>
                    <td><span style="font-weight: 800;" th:text="${riga['squadra']}"></span></td>
                    <td style="text-align: center;"><span class="card-badge badge-green" th:text="${riga['punti']}"></span></td>
                    <td style="text-align: center;" th:text="${riga['vittorie']}"></td>
                    <td style="text-align: center;" th:text="${riga['pareggi']}"></td>
                    <td style="text-align: center;" th:text="${riga['sconfitte']}"></td>
                    <td style="text-align: right; font-weight: 800; color: #475569;">
                        <span th:text="${riga['gf']}"></span>
                        <span style="color: #cbd5e1; margin: 0 2px;">-</span>
                        <span th:text="${riga['gs']}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(classifica)}" style="padding: 44px; text-align: center; color: #64748b; font-size: 14px;">
            Il torneo non e ancora iniziato o non ci sono partite registrate.
        </div>
    </div>

    <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="see-all" style="display: inline-block; margin-top: 20px;">&larr; Torna al torneo</a>
</section>
</body>
</html>
