<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Torneo</title>
</head>
<body>
<section>
    <div class="section-header">
        <span class="section-title" th:text="${torneo.nome}">Nome Torneo</span>
        <span class="card-badge badge-purple" th:text="${torneo.anno}">2026</span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 300px; gap: 24px;">
        <div>
            <div class="card">
                <h4 style="margin-bottom: 10px; color: #1e293b;">Informazioni</h4>
                <p style="color: #64748b; line-height: 1.6;" th:text="${torneo.descrizione}"></p>
                
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;">
                    <a th:href="@{/tornei/{id}/partite(id=${torneo.id})}" 
                       class="card-badge badge-blue" 
                       style="text-decoration: none;">
                       📅 Calendario
                    </a>
                    
                    <a th:href="@{/tornei/{id}/classifica(id=${torneo.id})}" 
                       class="card-badge badge-green" 
                       style="text-decoration: none;">
                       🏆 Classifica
                    </a>
                    
                    <a th:href="@{/react/classifica(torneoId=${torneo.id})}" 
                       class="card-badge badge-purple" 
                       style="text-decoration: none;">
                       ⚛️ Live React
                    </a>
                </div>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="card" style="border: 1px dashed #2563eb; background: #f0f7ff; border-radius: 12px;">
                <h4 style="margin-bottom: 15px; color: #1e40af;">Pannello Admin</h4>
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <a th:href="@{/admin/tornei/{id}/modifica(id=${torneo.id})}" class="card-badge badge-blue">Modifica Torneo</a>
                    <a th:href="@{/admin/partite/nuova(torneoId=${torneo.id})}" class="card-badge badge-green">+ Nuova Partita</a>
                    <a th:href="@{/admin/tornei/{id}/squadre(id=${torneo.id})}" class="card-badge badge-purple">Gestisci Iscrizioni</a>
                </div>
            </div>
        </div>

        <div>
            <div class="card" style="padding: 0; overflow: hidden; border-radius: 12px;">
                <div style="padding: 12px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: 14px; color: #475569;">
                    Squadre Partecipanti
                </div>
                <div style="padding: 8px 0;">
                    <div th:each="squadra : ${squadre}" style="padding: 8px 16px;">
                        <a th:href="@{/squadre/{id}(id=${squadra.id})}" 
                           style="text-decoration: none; color: #1e293b; font-size: 14px; display: block; transition: color 0.2s;" 
                           onmouseover="this.style.color='#2563eb'" 
                           onmouseout="this.style.color='#1e293b'"
                           th:text="${squadra.nome}"></a>
                    </div>
                    <div th:if="${#lists.isEmpty(squadre)}" style="padding: 16px; text-align: center; color: #94a3b8; font-size: 13px;">
                        Nessuna squadra iscritta.
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <a th:href="@{/tornei}" style="text-decoration: none; color: #64748b; font-size: 14px; display: inline-block; margin-top: 20px; transition: color 0.2s;" onmouseover="this.style.color='#2563eb'" onmouseout="this.style.color='#64748b'">← Torna alla lista tornei</a>
</section>
</body>
</html>
