<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: i_mio_layout(~{::section})}">
<body>
<section>
    <div class="section-header">
        <span class="section-title">Tornei Disponibili</span>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/tornei/nuovo}" class="card-badge badge-blue" style="text-decoration: none;">+ Crea Nuovo Torneo</a>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        <div class="card" th:each="torneo : ${tornei}">
            <span th:classappend="${torneo.anno >= 2026} ? 'badge-blue' : 'badge-purple'" 
                  class="card-badge" th:text="${torneo.anno}">2026</span>
            
            <h3 style="margin: 12px 0 8px 0; font-size: 18px; color: #1e293b;" th:text="${torneo.nome}">Nome Torneo</h3>
            <p style="font-size: 14px; color: #64748b; line-height: 1.5; margin-bottom: 20px;" th:text="${torneo.descrizione}">Descrizione breve del torneo...</p>
            
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; pt: 15px; margin-top: auto;">
                <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="card-btn" style="text-decoration: none;">Vedi Dettaglio</a>
                <span style="font-size: 12px; color: #94a3b8;" th:text="${#lists.size(torneo.partite)} + ' partite'">0 partite</span>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(tornei)}" style="text-align: center; padding: 60px; color: #94a3b8;">
        <p>Nessun torneo disponibile al momento.</p>
    </div>
</section>
</body>
</html>
